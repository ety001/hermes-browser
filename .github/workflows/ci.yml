name: build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  # Release published → builds binaries + extension, uploads to the Release.
  # Create a Release on GitHub UI or via CLI:
  #   gh release create v1.0.0 --title "v1.0.0" --notes "description"
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build Go binaries
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Cross-compile MCP Server
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          output="hermes-browser-${{ matrix.goos }}-${{ matrix.goarch }}"
          go build -o "dist/$output" -ldflags="-s -w" ./cmd/server/
          echo "Built: dist/$output"

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: hermes-browser-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/hermes-browser-${{ matrix.goos }}-${{ matrix.goarch }}
          if-no-files-found: error

  package-extension:
    name: Package Chrome Extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package extension/
        run: |
          mkdir -p dist
          cd extension
          zip -r ../dist/hermes-browser-extension.zip .
          echo "Packaged: dist/hermes-browser-extension.zip"

      - name: Upload extension zip
        uses: actions/upload-artifact@v4
        with:
          name: hermes-browser-extension
          path: dist/hermes-browser-extension.zip
          if-no-files-found: error

  # Only runs when a Release is published.
  # Downloads artifacts built by the jobs above and attaches them to the Release.
  upload-release-assets:
    name: Upload Release Assets
    if: github.event_name == 'release'
    needs: [build, package-extension]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Attach assets to Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd artifacts
          for dir in */; do
            asset_name="${dir%/}"
            file_path="${dir}$(ls "$dir")"
            echo "Uploading: $file_path → ${{ github.event.release.tag_name }}"
            gh release upload "${{ github.event.release.tag_name }}" "$file_path" \
              --repo "${{ github.repository }}" --clobber
          done
