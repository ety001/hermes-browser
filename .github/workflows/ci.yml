name: release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          ext=""
          [ "${{ matrix.goos }}" = "windows" ] && ext=".exe"
          binary="hermes-browser${ext}"
          go build -o "$binary" -ldflags="-s -w" ./cmd/server/

      - name: Package tar.gz
        run: |
          ext=""
          [ "${{ matrix.goos }}" = "windows" ] && ext=".exe"
          binary="hermes-browser${ext}"
          archive="hermes-browser-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz"
          tar czf "$archive" "$binary" README.md
          echo "Packaged: $archive"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hermes-browser-${{ matrix.goos }}-${{ matrix.goarch }}
          path: hermes-browser-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz
          if-no-files-found: error

  package-extension:
    name: Package Chrome Extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package extension
        run: |
          cd extension
          zip -r ../hermes-browser-extension.zip .
          echo "Packaged: hermes-browser-extension.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hermes-browser-extension
          path: hermes-browser-extension.zip
          if-no-files-found: error

  upload-release-assets:
    name: Upload Release Assets
    needs: [build, package-extension]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Attach assets to Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) | while read file; do
            echo "Uploading: $file → $RELEASE_TAG"
            gh release upload "$RELEASE_TAG" "$file" \
              --repo "${{ github.repository }}" --clobber
          done
