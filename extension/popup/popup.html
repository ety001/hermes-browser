<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {
            width: 420px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 13px;
            margin: 0;
            padding: 12px;
            background: #1a1a2e;
            color: #e0e0e0;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #333;
        }
        .header h2 {
            margin: 0;
            font-size: 16px;
            color: #fff;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-left: 8px;
        }
        .status-dot.connected { background: #4caf50; }
        .status-dot.reconnecting { background: #ff9800; }
        .status-dot.disconnected { background: #f44336; }

        .section {
            margin-bottom: 12px;
        }
        .section label {
            display: block;
            font-size: 11px;
            color: #888;
            margin-bottom: 4px;
        }
        .section input {
            width: 100%;
            padding: 6px 8px;
            border: 1px solid #444;
            border-radius: 4px;
            background: #16213e;
            color: #e0e0e0;
            font-size: 13px;
            box-sizing: border-box;
        }
        .section input::placeholder {
            color: #666;
        }

        .btn-row {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        .btn {
            flex: 1;
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
        }
        .btn-primary {
            background: #0f3460;
            color: #e0e0e0;
        }
        .btn-primary:hover { background: #1a4a8a; }
        .btn-danger {
            background: #5c1010;
            color: #e0e0e0;
        }
        .btn-danger:hover { background: #8a1a1a; }
        .btn-secondary {
            background: #333;
            color: #e0e0e0;
        }
        .btn-secondary:hover { background: #444; }

        .log-container {
            background: #16213e;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 8px;
            max-height: 200px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            line-height: 1.4;
        }
        .log-entry {
            padding: 2px 0;
            border-bottom: 1px solid #222;
        }
        .log-entry.success { color: #4caf50; }
        .log-entry.error { color: #f44336; }
        .log-entry.info { color: #2196f3; }
        .log-entry:last-child { border-bottom: none; }

        .action-row {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        .action-row .btn { font-size: 11px; }

        .status-text {
            font-size: 12px;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h2>Hermes Browser</h2>
        <div>
            <span id="statusLabel" class="status-text">Disconnected</span>
            <span id="statusDot" class="status-dot disconnected"></span>
        </div>
    </div>

    <div class="section">
        <label for="wsUrlInput">WebSocket Address</label>
        <input type="text" id="wsUrlInput" placeholder="ws://127.0.0.1:19876" />
    </div>

    <div class="section">
        <label for="tokenInput">Token</label>
        <input type="password" id="tokenInput" placeholder="Authentication token" />
    </div>

    <div class="btn-row">
        <button id="connectBtn" class="btn btn-primary">Connect</button>
        <button id="disconnectBtn" class="btn btn-danger" disabled>Disconnect</button>
    </div>

    <div class="section">
        <label>Operation Log</label>
        <div id="logContainer" class="log-container">
            <div class="log-entry info">Extension loaded. Configure connection and press Connect.</div>
        </div>
        <div class="action-row">
            <button id="clearLogBtn" class="btn btn-secondary">Clear Log</button>
            <button id="screenshotBtn" class="btn btn-secondary">Screenshot</button>
            <button id="getContentBtn" class="btn btn-secondary">Get Content</button>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
